<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scope - V8 | Practical JS</title>
<script>
    try {
        nonExistentFunction();
    } catch (error) {
        console.error(error);
        console.log("Catch block");
    } finally {
        console.log("finally");
    }
</script>    
</head>
<body>
    Catch block
</body>
</html>
